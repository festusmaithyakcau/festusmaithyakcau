name: Update README Date

on:
  schedule:
    # runs once a day at 00:00 EAT (Africa/Nairobi, UTC+3, no DST)
    - cron: "0 21 * * *"
  workflow_dispatch:

jobs:
  update-date:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v3

      - name: Stamp today's date into README.md and README.en-us.md
        run: |
          TODAY=$(TZ=Africa/Nairobi date +'%Y.%m.%d')
          YEAR=$(TZ=Africa/Nairobi date +'%Y')
          for f in README.md README.en-us.md; do
            sed -i -E "s/KERNEL%20v[0-9]{4}\.[0-9]{2}\.[0-9]{2}(%20EAT)?/KERNEL%20v${TODAY}%20EAT/g" "$f"
            sed -i -E "s/OS: FestusOS [0-9]{4}\.[0-9]{2}\.[0-9]{2}( EAT)?/OS: FestusOS ${TODAY} EAT/g" "$f"
            sed -i -E "s/Copyright [0-9]{4}/Copyright ${YEAR}/g" "$f"
          done

      - name: Commit & push if changed
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add README.md README.en-us.md
          git diff --cached --quiet || git commit -m "chore: stamp current date"
          git diff --cached --quiet || git push

      # only reached if the steps above succeeded — clears prior runs of this
      # workflow so history never accumulates beyond the run in progress
      - name: Delete previous workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: update-date.yml
          retain_days: 0
          keep_minimum_runs: 0
